<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no" />
  <title>Markdown Viewer</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+KR:wght@400;500;700&family=Nanum+Myeongjo:wght@400;700&family=Nanum+Gothic:wght@400;700&family=Gothic+A1:wght@400;700&family=IBM+Plex+Sans+KR:wght@400;500;700&display=swap"
    rel="stylesheet">
  <!-- Highlight.js Theme -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
</head>

<body>
  <div id="app">
    <header class="app-header">
      <div class="actions">
        <div class="btn-group">
          <select id="font-select" title="글꼴 선택">
            <option value="'Noto Sans KR', sans-serif">Noto Sans KR</option>
            <option value="'Nanum Myeongjo', serif">Nanum Myeongjo</option>
            <option value="'Nanum Gothic', sans-serif">Nanum Gothic</option>
            <option value="'Gothic A1', sans-serif">Gothic A1</option>
            <option value="'IBM Plex Sans KR', sans-serif">IBM Plex Sans KR</option>
          </select>
        </div>

        <div class="btn-group">
          <button id="load-btn" class="icon-btn" title="파일 열기">
            <svg xmlns="http://www.w3.org/2000/svg" width="19" height="19" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
              <polyline points="14 2 14 8 20 8" />
              <line x1="16" y1="13" x2="8" y2="13" />
              <line x1="16" y1="17" x2="8" y2="17" />
              <polyline points="10 9 9 9 8 9" />
            </svg>
          </button>
          <input type="file" id="file-input" accept=".md,.markdown,.txt" hidden />
          <button id="copy-btn" class="icon-btn" title="HTML 복사">
            <svg xmlns="http://www.w3.org/2000/svg" width="19" height="19" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect width="14" height="14" x="8" y="8" rx="2" ry="2" />
              <path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2" />
            </svg>
          </button>
          <button id="view-toggle-btn" class="icon-btn" title="뷰 전환">
            <svg xmlns="http://www.w3.org/2000/svg" width="19" height="19" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z" />
              <circle cx="12" cy="12" r="3" />
            </svg>
          </button>
        </div>

        <div class="btn-group">
          <button id="settings-open-btn" class="icon-btn" title="읽기 설정">
            <svg xmlns="http://www.w3.org/2000/svg" width="19" height="19" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="3" />
              <path
                d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
            </svg>
          </button>
        </div>
      </div>
    </header>
    <main class="split-container">
      <div class="pane editor-pane">
        <textarea id="markdown-input" placeholder="마크다운을 입력하세요..."></textarea>
      </div>
      <div class="pane preview-pane">
        <div id="preview-output" class="markdown-body"></div>
      </div>
    </main>

    <footer class="app-footer">
      <div class="footer-row playback-row">
        <button id="tts-repeat-en" class="icon-btn" title="영어 문장만 반복">
          <svg xmlns="http://www.w3.org/2000/svg" width="19" height="19" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17 2l4 4-4 4" />
            <path d="M3 11v-1a4 4 0 0 1 4-4h14" />
            <path d="M7 22l-4-4 4-4" />
            <path d="M21 13v1a4 4 0 0 1-4 4H3" />
          </svg>
        </button>

        <button id="tts-prev" class="icon-btn" title="이전 문장">
          <svg xmlns="http://www.w3.org/2000/svg" width="19" height="19" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="19 20 9 12 19 4 19 20"></polygon>
            <line x1="5" y1="19" x2="5" y2="5"></line>
          </svg>
        </button>

        <button id="footer-toggle" class="icon-btn play-btn" title="재생/일시정지">
          <svg id="footer-toggle-icon" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="5 3 19 12 5 21 5 3" />
          </svg>
        </button>

        <button id="footer-stop" class="icon-btn" title="초기화" disabled>
          <svg xmlns="http://www.w3.org/2000/svg" width="19" height="19" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="4" y="4" width="16" height="16" />
          </svg>
        </button>

        <button id="tts-next" class="icon-btn" title="다음 문장">
          <svg xmlns="http://www.w3.org/2000/svg" width="19" height="19" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="5 4 15 12 5 20 5 4"></polygon>
            <line x1="19" y1="5" x2="19" y2="19"></line>
          </svg>
        </button>

        <span id="sentence-counter" class="value-display counter">0 / 0</span>
      </div>
    </footer>

    <div id="settings-modal" class="modal-overlay hidden">
      <div class="modal-panel">
        <div class="modal-header">
          <h2>읽기 설정</h2>
          <button id="settings-close-btn" class="icon-btn" title="닫기">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18" />
              <line x1="6" y1="6" x2="18" y2="18" />
            </svg>
          </button>
        </div>

        <div class="modal-body">
          <section class="settings-section">
            <h3>재생 속도</h3>
            <div class="settings-row-item">
              <span class="control-label">EN 문장</span>
              <div class="control-group">
                <button id="rate-en-decrease" class="icon-btn sm" title="영어 속도 감소">−</button>
                <span id="rate-en-value" class="value-display">1.0</span>
                <button id="rate-en-increase" class="icon-btn sm" title="영어 속도 증가">+</button>
              </div>
            </div>
            <div class="settings-row-item">
              <span class="control-label">KR 문장</span>
              <div class="control-group">
                <button id="rate-ko-decrease" class="icon-btn sm" title="한글 속도 감소">−</button>
                <span id="rate-ko-value" class="value-display">1.0</span>
                <button id="rate-ko-increase" class="icon-btn sm" title="한글 속도 증가">+</button>
              </div>
            </div>
            <div class="settings-row-item">
              <span class="control-label">영어 문장만 반복</span>
              <label class="switch">
                <input type="checkbox" id="repeat-en-checkbox">
                <span class="switch-track"></span>
              </label>
            </div>
            <div class="settings-row-item">
              <span class="control-label">문장당 반복 횟수</span>
              <div class="control-group">
                <button id="repeat-count-decrease" class="icon-btn sm" title="반복 횟수 감소">−</button>
                <span id="repeat-count-value" class="value-display">2</span>
                <button id="repeat-count-increase" class="icon-btn sm" title="반복 횟수 증가">+</button>
              </div>
            </div>
          </section>

          <section class="settings-section">
            <h3>텍스트 크기</h3>
            <div class="settings-row-item">
              <span class="control-label">미리보기 글자 크기</span>
              <div class="control-group">
                <button id="size-decrease" class="icon-btn sm" title="텍스트 크기 감소">−</button>
                <span id="size-value" class="value-display">100%</span>
                <button id="size-increase" class="icon-btn sm" title="텍스트 크기 증가">+</button>
              </div>
            </div>
          </section>

          <section class="settings-section">
            <h3>음성</h3>
            <div class="settings-row-item">
              <span class="control-label">목소리</span>
              <select id="voice-select" class="voice-select" title="음성 선택"></select>
            </div>
            <div class="settings-row-item">
              <span class="control-label">오디오 형식</span>
              <select id="fmt-select" class="voice-select" title="오디오 형식">
                <option value="wav">WAV(집)</option>
                <option value="aac">AAC(원격)</option>
              </select>
            </div>
          </section>

          <section class="settings-section">
            <h3>Supertonic3 서버</h3>
            <div class="settings-row-item stacked">
              <label class="control-label" for="server-url-input">서버 주소</label>
              <input type="text" id="server-url-input" class="text-input" placeholder="https://...">
            </div>
            <div class="settings-row-item stacked">
              <label class="control-label" for="server-token-input">접근 토큰</label>
              <input type="text" id="server-token-input" class="text-input" placeholder="토큰">
            </div>
            <button id="server-save-btn" class="save-btn">저장</button>
          </section>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="/main.js"></script>
  <script type="module" src="/style.css"></script>
</body>

</html>
