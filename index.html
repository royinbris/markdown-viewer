<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Markdown Viewer</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+KR:wght@400;500;700&family=Nanum+Myeongjo:wght@400;700&family=Nanum+Gothic:wght@400;700&family=Gothic+A1:wght@400;700&family=IBM+Plex+Sans+KR:wght@400;500;700&display=swap"
    rel="stylesheet">
  <!-- Highlight.js Theme -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
</head>

<body>
  <div id="app">
    <header class="app-header">
      <h1>마크다운 뷰어</h1>
      <div class="actions">
        <select id="font-select" title="글꼴 선택">
          <option value="'Noto Sans KR', sans-serif">Noto Sans KR</option>
          <option value="'Nanum Myeongjo', serif">Nanum Myeongjo</option>
          <option value="'Nanum Gothic', sans-serif">Nanum Gothic</option>
          <option value="'Gothic A1', sans-serif">Gothic A1</option>
          <option value="'IBM Plex Sans KR', sans-serif">IBM Plex Sans KR</option>
        </select>
        <div class="tts-controls"
          style="display: flex; gap: 8px; margin-right: 16px; border-right: 1px solid var(--border-color); padding-right: 16px;">
          <button id="tts-toggle" class="icon-btn" title="재생/일시정지">
            <svg id="tts-toggle-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
              fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="5 3 19 12 5 21 5 3" />
            </svg>
          </button>
          <button id="tts-stop" class="icon-btn" title="초기화" disabled>
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="4" y="4" width="16" height="16" />
            </svg>
          </button>
        </div>
        <button id="load-btn" class="icon-btn" title="파일 열기">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
            <polyline points="14 2 14 8 20 8" />
            <line x1="16" y1="13" x2="8" y2="13" />
            <line x1="16" y1="17" x2="8" y2="17" />
            <polyline points="10 9 9 9 8 9" />
          </svg>
        </button>
        <input type="file" id="file-input" accept=".md,.markdown,.txt" hidden />
        <button id="copy-btn" class="icon-btn" title="HTML 복사">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect width="14" height="14" x="8" y="8" rx="2" ry="2" />
            <path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2" />
          </svg>
        </button>
        <button id="view-toggle-btn" class="icon-btn" title="뷰 전환">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z" />
            <circle cx="12" cy="12" r="3" />
          </svg>
        </button>
      </div>
    </header>
    <main class="split-container">
      <div class="pane editor-pane">
        <textarea id="markdown-input" placeholder="마크다운을 입력하세요..."></textarea>
      </div>
      <div class="pane preview-pane">
        <div id="preview-output" class="markdown-body"></div>
      </div>
    </main>

    <footer class="app-footer">
      <div class="control-group">
        <span class="control-label">속도</span>
        <button id="rate-decrease" class="icon-btn sm" title="속도 감소">-</button>
        <span id="rate-value" class="value-display">1.0</span>
        <button id="rate-increase" class="icon-btn sm" title="속도 증가">+</button>
      </div>

      <div class="separator"></div>


      <div class="control-group">
        <span class="control-label">크기</span>
        <button id="size-decrease" class="icon-btn sm" title="텍스트 크기 감소">-</button>
        <span id="size-value" class="value-display">100%</span>
        <button id="size-increase" class="icon-btn sm" title="텍스트 크기 증가">+</button>
      </div>

      <div class="spacer"></div>

      <div class="control-group">
        <span class="control-label">음성</span>
        <select id="voice-select" class="voice-select" title="음성 선택"></select>
        <select id="fmt-select" class="voice-select" title="오디오 형식">
          <option value="wav">WAV(집)</option>
          <option value="aac">AAC(원격)</option>
        </select>
        <button id="server-settings" class="icon-btn sm" title="서버 설정">⚙</button>
      </div>

      <div class="playback-controls">
        <button id="tts-prev" class="icon-btn" title="이전 문장">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="19 20 9 12 19 4 19 20"></polygon>
            <line x1="5" y1="19" x2="5" y2="5"></line>
          </svg>
        </button>

        <!-- Moved/Duplicated main play controls here for better UX if desired, or keep generic here -->
        <!-- Since existing controls are in header, let's keep them there but add prev/next here OR duplicate play/pause here. 
             The screenshot shows the main play bar at bottom right. Let's start with Prev/Next here and maybe Move Play/Pause logic here later or now.
             The plan said "Playback controls (Prev, Play/Pause, Next)". I will add Play/Pause here too and sync them or just move them.
             For now, I'll add Play/Pause/Stop here and HIDE the header ones eventually or keep them as duplicate. -->

        <button id="footer-toggle" class="icon-btn" title="재생/일시정지">
          <svg id="footer-toggle-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="5 3 19 12 5 21 5 3" />
          </svg>
        </button>

        <button id="footer-stop" class="icon-btn" title="초기화" disabled>
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="4" y="4" width="16" height="16" />
          </svg>
        </button>

        <button id="tts-next" class="icon-btn" title="다음 문장">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="5 4 15 12 5 20 5 4"></polygon>
            <line x1="19" y1="5" x2="19" y2="19"></line>
          </svg>
        </button>

        <span id="sentence-counter" class="value-display"
          style="margin-left: 10px; font-variant-numeric: tabular-nums;">0
          / 0</span>

      </div>
    </footer>
  </div>
  <script type="module" src="/main.js"></script>
  <script type="module" src="/style.css"></script>
</body>

</html>
